server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:placementsdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-placeholder-secret-string-at-least-32-chars-long-placement-os}
    expiration-ms: 604800000 # 7 days
  cors:
    allowed-origins: ${ALLOWED_ORIGIN:http://localhost:5000}
  leetcode:
    graphql-url: https://leetcode.com/graphql
    sync-cron: "0 0 * * * *" # Hourly trigger
  youtube:
    api-key: ${YOUTUBE_API_KEY:}
    playlist-id: ${YOUTUBE_PLAYLIST_ID:PLbJhGqY-mq47k_WLUtzVjmarUm1EuXPj2}

logging:
  level:
    org.springframework.security: INFO
    com.placements.backend: DEBUG
